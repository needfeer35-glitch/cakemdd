name: Build CakeAuto Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Arrange source files
      run: |
        mkdir -p src/main/java/com/cakeauto/client
        mkdir -p src/main/java/com/cakeauto/mixin
        mkdir -p src/main/resources
        cp CakeAutoMod.java src/main/java/com/cakeauto/
        cp CakeCommand.java src/main/java/com/cakeauto/
        cp CakeAutoPackets.java src/main/java/com/cakeauto/
        cp CakeAutoState.java src/main/java/com/cakeauto/
        cp CakeAutoClient.java src/main/java/com/cakeauto/client/
        cp CakeAutoScreen.java src/main/java/com/cakeauto/client/
        cp CraftingResultSlotMixin.java src/main/java/com/cakeauto/mixin/
        cp fabric.mod.json src/main/resources/
        cp cakeauto.mixins.json src/main/resources/
        echo "=== Structure ==="
        find src -type f

    - name: Build with Gradle
      run: gradle build --info 2>&1 | tail -50

    - name: Upload mod JAR
      uses: actions/upload-artifact@v4
      with:
        name: cakeauto-mod
        path: build/libs/cakeauto-*.jar
        if-no-files-found: error
